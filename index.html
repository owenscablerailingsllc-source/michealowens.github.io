<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Owens Cable Railings LLC — Premium Installations</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Barlow:wght@400;600;700&family=Barlow+Condensed:wght@500;700&display=swap" rel="stylesheet">

<style>
:root{
--black:#080808;
--dark:#0f0f0e;
--gold:#c9a84c;
--white:#f7f4ee;
--muted:#9e9b93;
--line:rgba(255,255,255,.07);
}

*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Barlow',sans-serif;background:var(--black);color:var(--white)}

.wrap{width:90%;max-width:1200px;margin:auto}

/* HEADER */
header{position:fixed;width:100%;top:0;background:rgba(0,0,0,.8);padding:20px;z-index:10}
.nav{display:flex;justify-content:space-between;align-items:center}

.nav a{color:var(--white);margin-left:20px;text-decoration:none;font-size:14px}

.logo{font-weight:700;letter-spacing:2px}

/* HERO */
.hero{
height:100vh;
display:flex;
align-items:center;
background:url('IMG_5607.png') center/cover no-repeat;
position:relative;
}

.hero::after{
content:'';
position:absolute;
inset:0;
background:rgba(0,0,0,.6);
}

.hero-content{
position:relative;
z-index:2;
}

.hero h1{
font-family:'Cormorant Garamond',serif;
font-size:60px;
margin-bottom:20px;
}

.btn{
display:inline-block;
padding:14px 28px;
background:var(--gold);
color:black;
text-decoration:none;
margin-top:20px;
}

/* SECTION */
section{padding:80px 0}

/* REVIEWS */
.review{
border:1px solid var(--line);
padding:20px;
margin-top:20px;
}

/* CONTACT */
.contact a{display:block;margin:10px 0;color:var(--gold)}

/* MOBILE */
@media(max-width:768px){
.hero h1{font-size:40px}
}
</style>
</head>

<body>

<header>
  <div class="wrap nav">
    <div class="logo">OWENS</div>
    <div>
      <a href="#about">About</a>
      <a href="#gallery">Gallery</a>
      <a href="#quote">Quote</a>
    </div>
  </div>
</header>

<section class="hero">
  <div class="wrap hero-content">
    <h1>Built for Views.<br>Crafted to Last.</h1>
    <p>Premium cable railing installs for lake homes.</p>
    <a href="#quote" class="btn">Get Quote</a>
  </div>
</section>

<section id="about">
  <div class="wrap">
    <h2>About</h2>
    <p>Owner-operated. No subcontractors. Clean installs done right.</p>
  </div>
</section>

<section id="gallery">
  <div class="wrap">
    <h2>Gallery</h2>
    <p>Add your project images here.</p>
  </div>
</section>

<section id="reviews">
  <div class="wrap">
    <h2>Reviews</h2>
    <div id="reviewsList"></div>
  </div>
</section>

<section id="quote" class="contact">
  <div class="wrap">
    <h2>Contact</h2>
    <a href="tel:5738738440">(573) 873-8440</a>
    <a href="mailto:owenscablerailingsllc@gmail.com">Email</a>
  </div>
</section>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore, collection, addDoc, getDocs,
  query, orderBy, serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDlui3X3HvCeiC52W_Vqs8rSQzQi5riz2A",
  authDomain: "owens-cable-railings-llc.firebaseapp.com",
  projectId: "owens-cable-railings-llc",
  storageBucket: "owens-cable-railings-llc.firebasestorage.app",
  messagingSenderId: "999651019725",
  appId: "1:999651019725:web:995c7d03f78c210e4b5284"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const reviewsList = document.getElementById("reviewsList");

async function loadReviews(){
  reviewsList.innerHTML="";
  const q=query(collection(db,"reviews"),orderBy("created","desc"));
  const snap=await getDocs(q);

  snap.forEach(doc=>{
    const r=doc.data();
    reviewsList.innerHTML+=`
      <div class="review">
        <strong>${r.name}</strong><br>
        ${"★".repeat(r.rating)}<br>
        "${r.message}"
      </div>
    `;
  });
}

loadReviews();
</script>

</body>
</html>
